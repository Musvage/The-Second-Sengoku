 ### help
 help_trade_tooltip:0 "Japan is not isolated from В§Hinternational tradeВ§!, since the western powers stablished various В§Htrade centersВ§! connecting it to their colonial empires and domestic markets. These trade centres provide a variety of В§HresourcesВ§! that could hardly be obtained in Japan.\n\nAlong side these coastal trade centres, there are important В§HrailwayВ§! connections in В§HSiberiaВ§! and В§HManchuriaВ§!.\n\nThe В§HcaptureВ§! of any of these centres of trade will not interrupt the flow of resources completely but it will В§Rsuffer severlyВ§!.\n\nВ§HEventsВ§! in the outside world, such as exchanges of territories in Europe or other colonies can В§HchangeВ§! the resources available in each center."
